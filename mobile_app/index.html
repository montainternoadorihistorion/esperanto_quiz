<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f7a5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Esperanto Quiz">
    <title>Esperanto Quiz</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="top-bar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">E</div>
          <div class="brand-copy">
            <h1>Esperanto Quiz</h1>
            <p id="saveStatus">読み込み中</p>
          </div>
        </div>
        <button id="resumeButton" class="icon-text-button" type="button" hidden>続き</button>
      </header>

      <main class="main-shell">
        <section id="loadingView" class="state-view is-active" aria-live="polite">
          <div class="loading-panel">
            <div class="loading-ring" aria-hidden="true"></div>
            <p>データを読み込んでいます</p>
          </div>
        </section>

        <section id="setupView" class="state-view setup-view">
          <div class="segmented-control" role="tablist" aria-label="出題モード">
            <button id="modeVocab" class="is-selected" type="button" role="tab" aria-selected="true">単語</button>
            <button id="modeSentence" type="button" role="tab" aria-selected="false">例文</button>
          </div>

          <div id="resumeNotice" class="resume-notice" hidden>
            <div>
              <strong>保存されたクイズがあります</strong>
              <p id="resumeMeta"></p>
            </div>
            <button id="resumeNoticeButton" class="secondary-action" type="button">続きから再開</button>
          </div>

          <form id="setupForm" class="setup-form">
            <div class="form-row">
              <label for="userName">ユーザー名</label>
              <input id="userName" name="userName" autocomplete="nickname" inputmode="text" maxlength="32">
            </div>

            <div class="form-row">
              <label for="directionSelect">出題方向</label>
              <select id="directionSelect" name="direction">
                <option value="eo_to_ja">エスペラント → 日本語</option>
                <option value="ja_to_eo">日本語 → エスペラント</option>
              </select>
            </div>

            <div id="vocabSettings" class="mode-settings">
              <div class="form-row split-row">
                <div>
                  <label for="seedInput">シード</label>
                  <input id="seedInput" name="seed" type="number" min="1" max="8192" step="1" inputmode="numeric">
                </div>
                <div>
                  <label for="posSelect">品詞</label>
                  <select id="posSelect" name="pos"></select>
                </div>
              </div>
              <div class="form-row">
                <label for="groupSelect">グループ</label>
                <select id="groupSelect" name="group"></select>
              </div>
            </div>

            <div id="sentenceSettings" class="mode-settings" hidden>
              <div class="form-row">
                <label for="topicSelect">トピック</label>
                <select id="topicSelect" name="topic"></select>
              </div>
              <div class="form-row">
                <label for="subtopicSelect">サブトピック</label>
                <select id="subtopicSelect" name="subtopic"></select>
              </div>
              <fieldset class="chip-fieldset">
                <legend>レベル</legend>
                <div id="levelChips" class="chip-grid"></div>
              </fieldset>
            </div>

            <div class="form-row">
              <label for="audioMode">音声</label>
              <select id="audioMode" name="audioMode">
                <option value="prompt">問題を自動再生</option>
                <option value="all">問題自動＋選択肢</option>
                <option value="off">オフ</option>
              </select>
            </div>

            <label class="toggle-row">
              <input id="spartanMode" name="spartanMode" type="checkbox">
              <span>スパルタ復習</span>
            </label>

            <button id="startButton" class="primary-action" type="submit">クイズ開始</button>
          </form>
        </section>

        <section id="quizView" class="state-view quiz-view">
          <div class="quiz-head">
            <div>
              <p id="phaseLabel" class="phase-label">Q1</p>
              <h2 id="promptText" class="prompt-text"></h2>
            </div>
            <button id="promptAudioButton" class="round-button" type="button" aria-label="問題文の音声を再生" hidden>♪</button>
          </div>

          <div class="progress-block">
            <div class="progress-track" aria-hidden="true">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <div class="stat-strip">
              <span id="correctStat">正解 0/0</span>
              <span id="streakStat">連続 0</span>
              <span id="remainingStat">残り 0</span>
            </div>
          </div>

          <div id="feedbackPanel" class="feedback-panel" hidden>
            <p id="feedbackText"></p>
            <button id="nextButton" class="primary-action" type="button">次へ</button>
          </div>

          <div id="choiceGrid" class="choice-grid" aria-label="選択肢"></div>
        </section>

        <section id="resultView" class="state-view result-view">
          <div class="result-summary">
            <p class="phase-label">結果</p>
            <h2 id="resultTitle">完了</h2>
            <div class="result-metrics">
              <div><span id="accuracyMetric">0%</span><small>正答率</small></div>
              <div><span id="pointsMetric">0</span><small>得点</small></div>
              <div><span id="countMetric">0/0</span><small>正解</small></div>
            </div>
          </div>
          <div class="result-actions">
            <button id="syncScoreButton" class="primary-action score-sync-button" type="button">ランキングに保存</button>
            <p id="syncScoreStatus" class="score-sync-status" role="status" aria-live="polite"></p>
            <button id="retryButton" class="secondary-action" type="button">同じ設定でもう一度</button>
            <button id="newQuizButton" class="primary-action" type="button">新しいクイズ</button>
          </div>
          <section class="review-section">
            <h3>復習</h3>
            <div id="reviewList" class="review-list"></div>
          </section>
        </section>

        <section id="historyView" class="state-view history-view">
          <div class="section-title-row">
            <h2>成績</h2>
            <button id="clearHistoryButton" class="text-button" type="button">端末履歴のみ消去</button>
          </div>
          <section id="cloudRankingSection" class="cloud-ranking-section" aria-labelledby="cloudRankingTitle">
            <div class="ranking-title-row">
              <div>
                <h3 id="cloudRankingTitle">ランキング</h3>
                <p id="rankingStatus" role="status" aria-live="polite">読み込み前</p>
              </div>
              <button id="rankingRefreshButton" class="text-button" type="button">更新</button>
            </div>
            <div class="ranking-tabs" role="tablist" aria-label="ランキング種別">
              <button class="is-selected" type="button" data-ranking-tab="overall" role="tab" aria-selected="true">累積</button>
              <button type="button" data-ranking-tab="today" role="tab" aria-selected="false">本日</button>
              <button type="button" data-ranking-tab="month" role="tab" aria-selected="false">今月</button>
              <button type="button" data-ranking-tab="hof" role="tab" aria-selected="false">殿堂</button>
            </div>
            <div id="rankingList" class="ranking-list"></div>
          </section>
          <div id="historyList" class="history-list"></div>
        </section>

        <section id="diagnosticsView" class="state-view diagnostics-view">
          <div class="section-title-row">
            <h2>診断</h2>
            <button id="diagnosticsRefreshButton" class="text-button" type="button">更新</button>
          </div>
          <div id="diagnosticsList" class="diagnostics-list"></div>
        </section>

        <section id="errorView" class="state-view error-view">
          <h2>読み込みに失敗しました</h2>
          <p id="errorMessage"></p>
          <button id="reloadButton" class="primary-action" type="button">再読み込み</button>
        </section>
      </main>

      <footer id="appLinkPanel" class="app-link-panel" aria-label="関連リンク">
        <div class="app-link-group">
          <span id="languageLinksLabel">言語</span>
          <div class="app-link-row">
            <a id="jaAppLink" href="https://esperanto-quiz.streamlit.app/?mobile_app=1" target="_blank" rel="noopener noreferrer">日本語</a>
            <a id="zhAppLink" href="https://esperanto-quiz-zh.streamlit.app/?mobile_app=1" target="_blank" rel="noopener noreferrer">中文</a>
            <a id="koAppLink" href="https://esperanto-quiz-ko.streamlit.app/?mobile_app=1" target="_blank" rel="noopener noreferrer">한국어</a>
          </div>
        </div>
        <div class="app-link-group">
          <span id="versionLinksLabel">表示</span>
          <div class="app-link-row version-link-row">
            <a id="mobileAppLink" href="?mobile_app=1" target="_blank" rel="noopener noreferrer nofollow">スマホ版</a>
            <a id="classicAppLink" href="?classic=1" target="_blank" rel="noopener noreferrer nofollow">PC版</a>
          </div>
        </div>
      </footer>

      <nav class="bottom-nav" aria-label="メイン">
        <button id="homeNav" class="is-selected" type="button">ホーム</button>
        <button id="quizNav" type="button">クイズ</button>
        <button id="historyNav" type="button">成績</button>
        <button id="diagnosticsNav" type="button">診断</button>
      </nav>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
